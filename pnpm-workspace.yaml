packages:
  - "."

overrides:
  protobufjs: ">=7.6.4"
  lodash: ">=4.18.1"
  ws: ">=8.21.0"
  undici: "~7.28.0"
  form-data: ">=4.0.6"
  # Keep the Web5/DWN AJV remediation scoped so ESLint's AJV 6 remains unchanged.
  "@tbd54566975/dwn-sdk-js@0.5.1>ajv": "8.18.0"
  "@babel/core": "7.29.6"
  uuid: "11.1.1"

minimumReleaseAge: 60
minimumReleaseAgeExclude:
  - "@capacitor/*"
  - "@vitejs/*"
  - "vite"
  - "vitest"

strictDepBuilds: false
allowBuilds:
  "@google/genai": true
  "@swc/core": true
  "bigint-buffer": true
  "bufferutil": true
  "classic-level": true
  "esbuild": true
  "protobufjs": true
  "tiny-secp256k1": true
  "utf-8-validate": true
