name: Deploy Changelly Proxy

on:
  push:
    branches:
      - main
    paths:
      - 'conxian-gateway/changelly-proxy/**'
      - '.github/workflows/deploy-proxy.yml'
  workflow_dispatch:

env:
  PROJECT_ID: gen-lang-client-0264096458
  REGION: us-central1
  SERVICE_NAME: changelly-proxy
  REPO_NAME: changelly-proxy

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bbf873cbb8b7a961c67208f4c34cd465615 # v7.0.0

      # Authenticate to Google Cloud using SA Key stored in secrets
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@71fee32a0bb7e97b4d33d548e7d957010649d8ca # v2.1.8
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@618e290b993df2e4288cf80893001f8fca2626fd # v2.1.2

      - name: Configure Docker Auth
        run: |
          gcloud auth configure-docker

      - name: Build and Push Container
        run: |
          cd conxian-gateway/changelly-proxy
          gcloud builds submit --tag gcr.io/$PROJECT_ID/$REPO_NAME

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --image gcr.io/$PROJECT_ID/$REPO_NAME \
            --platform managed \
            --region $REGION \
            --allow-unauthenticated \
            --set-env-vars CHANGELLY_API_KEY=${{ secrets.CHANGELLY_API_KEY }},CHANGELLY_API_SECRET=${{ secrets.CHANGELLY_API_SECRET }}
