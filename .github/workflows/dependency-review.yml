name: Dependency Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: read

jobs:
  dependency-review:
    uses: Conxian/.github/.github/workflows/dependency-review.yml@f39273c26a29390a6e80ab886ed23beb8d94e535
    permissions:
      contents: read
      pull-requests: write
    with:
      base-ref: ${{ github.event.pull_request.base.sha }}
      head-ref: ${{ github.event.pull_request.head.sha }}
