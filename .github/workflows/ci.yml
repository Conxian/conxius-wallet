name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v7.0.0
    
    - name: Setup Node.js
      uses: actions/setup-node@v7.0.0
      with:
        node-version: 22.x

    - name: Setup pnpm
      uses: pnpm/action-setup@v6.0.9
      with:
        version: 11.13.0
        run_install: false

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    
    - name: Security Lint - Enforce FLAG_SECURE & allowBackup=false
      run: |
        MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
        if [ -f "$MANIFEST_PATH" ]; then
          if grep -q 'android:allowBackup="true"' "$MANIFEST_PATH"; then
            echo "::error file=$MANIFEST_PATH::CRITICAL: android:allowBackup must be false"
            exit 1
          fi
          if grep -q 'android:fullBackupContent="true"' "$MANIFEST_PATH"; then
            echo "::error file=$MANIFEST_PATH::CRITICAL: android:fullBackupContent must be false"
            exit 1
          fi
          echo "Security lint passed: Android backups are disabled."
        else
          echo "Warning: AndroidManifest.xml not found at $MANIFEST_PATH. Skipping manifest security lint."
        fi

    - name: Runtime contamination guard (CON-393)
      run: bash scripts/ci/check_runtime_contamination.sh

    - name: Lint
      run: pnpm run lint

    - name: Run tests
      run: pnpm exec vitest run
      env:
        VITEST: true

    - name: Security Audit (high/critical with tracked exceptions)
      run: pnpm exec node scripts/ci/audit_with_exceptions.mjs

    - name: Build
      run: pnpm run build
