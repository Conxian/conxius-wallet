name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  ci:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    
    - name: Setup Node.js
      uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
      with:
        node-version: 22.x

    - name: Setup pnpm
      uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
      with:
        version: 10.30.3
        run_install: false

    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    
    - name: Security Lint - Enforce FLAG_SECURE & allowBackup=false
      run: |
        MANIFEST_PATH="android/app/src/main/AndroidManifest.xml"
        if [ -f "$MANIFEST_PATH" ]; then
          if grep -q 'android:allowBackup="true"' "$MANIFEST_PATH"; then
            echo "::error file=$MANIFEST_PATH::CRITICAL: android:allowBackup must be false"
            exit 1
          fi
          if grep -q 'android:fullBackupContent="true"' "$MANIFEST_PATH"; then
            echo "::error file=$MANIFEST_PATH::CRITICAL: android:fullBackupContent must be false"
            exit 1
          fi
          echo "Security lint passed: Android backups are disabled."
        else
          echo "Warning: AndroidManifest.xml not found at $MANIFEST_PATH. Skipping manifest security lint."
        fi

    - name: Runtime contamination guard (CON-393)
      run: bash scripts/ci/check_runtime_contamination.sh

    - name: Run tests
      run: pnpm exec vitest run
      env:
        VITEST: true

    - name: Upload test artifacts
      if: always()
      uses: actions/upload-artifact@4cec3d8aa04e39d1a68397de0c4cd6fb9dce8ec1 # v4.6.1
      with:
        name: test-artifacts
        path: |
          test-results
          playwright-report
          blob-report
          coverage
        if-no-files-found: ignore
        retention-days: 14
    
    - name: Build
      run: pnpm run build
