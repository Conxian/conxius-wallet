name: Secret Scanning

on:
  push:
    branches: [main, develop, staged]
  pull_request:
    branches: [main, develop, staged]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
      - name: Require the mandatory Gitleaks organization license
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        run: |
          set -euo pipefail
          if [[ -z "${GITLEAKS_LICENSE:-}" ]]; then
            echo "::error::GITLEAKS_LICENSE is required for the mandatory repository secret scan"
            exit 1
          fi
      - name: Run repository-owned Gitleaks policy
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITLEAKS_CONFIG: .gitleaks.toml
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_VERSION: 8.24.3
          GITLEAKS_ENABLE_COMMENTS: 'false'
          GITLEAKS_ENABLE_SUMMARY: 'true'

  gitguardian:
    name: GitGuardian (Optional Secondary)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GITGUARDIAN_CONFIGURED: ${{ secrets.GITGUARDIAN_API_KEY != '' }}
    steps:
      - name: Checkout repository history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
      - name: Run optional GitGuardian scan
        if: ${{ env.GITGUARDIAN_CONFIGURED == 'true' }}
        uses: GitGuardian/ggshield-action@da20be06cafe5e8633dc24744efe1efe8d30f06b # v1.52.2
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
