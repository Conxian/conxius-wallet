name: Secret Scanning

on:
  push:
    branches: [main, develop, staged]
  pull_request:
    branches: [main, develop, staged]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  gitleaks:
    name: Secret Scanning (Gitleaks)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
      - name: Install verified Gitleaks CLI
        id: install-gitleaks
        run: |
          set -euo pipefail
          GITLEAKS_BIN="$(bash scripts/ci/install_gitleaks.sh "$RUNNER_TEMP/gitleaks")"
          echo "GITLEAKS_BIN=$GITLEAKS_BIN" >> "$GITHUB_ENV"
          "$GITLEAKS_BIN" version
      - name: Scan full repository history with repository-owned policy
        run: |
          set -euo pipefail
          "$GITLEAKS_BIN" git \
            --config .gitleaks.toml \
            --gitleaks-ignore-path .gitleaksignore \
            --redact=100 \
            --no-banner \
            --no-color \
            --log-level error \
            --exit-code 1 \
            .

  gitguardian:
    name: GitGuardian (Optional Secondary)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      GITGUARDIAN_CONFIGURED: ${{ secrets.GITGUARDIAN_API_KEY != '' }}
    steps:
      - name: Checkout repository history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
      - name: Run optional GitGuardian scan
        if: ${{ env.GITGUARDIAN_CONFIGURED == 'true' }}
        uses: GitGuardian/ggshield-action@da20be06cafe5e8633dc24744efe1efe8d30f06b # v1.52.2
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
