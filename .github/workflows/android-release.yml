name: Android Release

on:
  workflow_dispatch:
    inputs:
      track:
        description: Google Play track to upload to
        required: true
        default: internal
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      status:
        description: Release status in Google Play
        required: true
        default: completed
        type: choice
        options:
          - completed
          - draft
          - halted
          - inProgress

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bbf873cbb8b7a961c67208f4c34cd465615 # v7.0.0

      - name: Setup Java
        uses: actions/setup-java@dc8d26568cedb6be26d3a6ab0898d0b5c9f06375 # v5.3.0
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@48b55a0dca97e80a5f4bb8dec8dc1c12a5a3e059 # v6.4.0
        with:
          node-version: 22.x

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47132cd2d4f08ca13ae2be949145cd17ab1d # v6.0.9
        with:
          version: 10.30.3
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web assets
        run: pnpm run build

      - name: Sync Capacitor Android project
        run: pnpm exec cap sync android

      - name: Decode Android release keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          umask 077
          KEYSTORE_FILE="${RUNNER_TEMP}/conxius-release.keystore"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_FILE"
          echo "KEYSTORE_PATH=$KEYSTORE_FILE" >> "$GITHUB_ENV"

      - name: Build signed Android App Bundle
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew --no-daemon bundleRelease

      - name: Upload signed bundle artifact
        uses: actions/upload-artifact@4cec3d8d14a89d7e5e0c327757b26447a6577a77 # v4.6.1
        with:
          name: android-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@b9b0e8f98badecb6b5c6c2130b57810ac27104a1 # v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.conxius.wallet
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ inputs.track }}
          status: ${{ inputs.status }}

      - name: Cleanup temporary keystore
        if: always()
        shell: bash
        run: |
          if [ -n "${KEYSTORE_PATH:-}" ] && [ -f "$KEYSTORE_PATH" ]; then
            shred -u "$KEYSTORE_PATH" || rm -f "$KEYSTORE_PATH"
          fi
