name: Android Release

on:
  workflow_dispatch:
    inputs:
      track:
        description: Google Play track to upload to
        required: true
        default: internal
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
      status:
        description: Release status in Google Play
        required: true
        default: completed
        type: choice
        options:
          - completed
          - draft
          - halted
          - inProgress

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web assets
        run: pnpm run build

      - name: Sync Capacitor Android project
        run: pnpm exec cap sync android

      - name: Decode Android release keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          umask 077
          KEYSTORE_FILE="${RUNNER_TEMP}/conxius-release.keystore"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_FILE"
          echo "KEYSTORE_PATH=$KEYSTORE_FILE" >> "$GITHUB_ENV"

      - name: Build signed Android App Bundle
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew --no-daemon bundleRelease

      - name: Upload signed bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - name: Upload to Google Play
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.conxius.wallet
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ inputs.track }}
          status: ${{ inputs.status }}

      - name: Cleanup temporary keystore
        if: always()
        shell: bash
        run: |
          if [ -n "${KEYSTORE_PATH:-}" ] && [ -f "$KEYSTORE_PATH" ]; then
            shred -u "$KEYSTORE_PATH" || rm -f "$KEYSTORE_PATH"
          fi
