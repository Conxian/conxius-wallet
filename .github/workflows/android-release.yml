name: Android Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Repository version to verify and release
        required: true
        default: '1.9.5'
        type: string
      tag:
        description: Exact immutable release tag
        required: true
        default: v1.9.5
        type: string
      operation:
        description: Publish a newly verified payload or recover evidence after a prior Play publication
        required: true
        default: publish
        type: choice
        options:
          - publish
          - recover
      source_run_id:
        description: Successful Android Release run ID whose verified payload should be recovered
        required: false
        type: string
      source_sha:
        description: Full source commit SHA from the successful Android Release run
        required: false
        type: string
      recovery_confirmation:
        description: Type PLAY_PUBLISHED only after confirming the exact version in Google Play
        required: false
        type: string

concurrency:
  group: android-release-${{ inputs.tag || inputs.version }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-verify:
    if: inputs.operation == 'publish'
    name: Release Verification and Build
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      version_code: ${{ steps.version.outputs.version_code }}
      artifact_name: ${{ steps.version.outputs.artifact_name }}
    steps:
      - name: Checkout source commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Validate release version and tag consistency
        id: version
        env:
          EXPECTED_VERSION: ${{ inputs.version }}
          EXPECTED_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          node scripts/ci/check_release_version.mjs \
            --expected-version "$EXPECTED_VERSION" \
            --expected-tag "$EXPECTED_TAG"
          echo "version=$EXPECTED_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$EXPECTED_TAG" >> "$GITHUB_OUTPUT"
          echo "artifact_name=conxius-wallet-release-$EXPECTED_VERSION" >> "$GITHUB_OUTPUT"
          VERSION_CODE=$(node scripts/ci/derive_android_version_code.mjs "$EXPECTED_VERSION")
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"

      - name: Setup Java
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 22.x

      - name: Setup pnpm
        uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        with:
          version: 11.13.0
          run_install: false

      - name: Install JavaScript dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm exec tsc --noEmit

      - name: Unit tests
        run: pnpm exec vitest run
        env:
          VITEST: true

      - name: Web build
        run: pnpm run build

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm run test:e2e
        env:
          CI: true

      - name: Dependency audit policy
        run: pnpm exec node scripts/ci/audit_with_exceptions.mjs

      - name: Android security policy
        run: bash scripts/ci/validate_android_security.sh

      - name: Setup Android SDK
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install Android SDK packages
        shell: bash
        run: |
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          sdkmanager "platform-tools" "platforms;android-36" "build-tools;35.0.0" "ndk;27.2.12479018"

      - name: Setup Rust and Android targets
        uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
          targets: aarch64-linux-android,x86_64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk --version 4.1.2 --locked

      - name: Sync Capacitor Android project
        run: pnpm exec cap sync android

      - name: Validate release signing preconditions
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          ANDROID_SIGNING_CERT_SHA256: ${{ vars.ANDROID_SIGNING_CERT_SHA256 }}
        run: |
          set -euo pipefail
          for variable in KEYSTORE_BASE64 KEYSTORE_PASSWORD KEY_ALIAS KEY_PASSWORD; do
            if [[ -z "${!variable:-}" ]]; then
              echo "::error::Required Android signing secret is not configured: $variable"
              exit 1
            fi
          done
          CERT_DIGEST="$(printf '%s' "$ANDROID_SIGNING_CERT_SHA256" | tr -d '[:space:]:-')"
          if [[ ! "$CERT_DIGEST" =~ ^[0-9a-fA-F]{64}$ ]]; then
            echo "::error::ANDROID_SIGNING_CERT_SHA256 must be a 64-hex public certificate fingerprint GitHub variable"
            exit 1
          fi

      - name: Download and checksum-verify pinned bundletool
        env:
          BUNDLETOOL_URL: https://github.com/google/bundletool/releases/download/1.18.3/bundletool-all-1.18.3.jar
          BUNDLETOOL_SHA256: a099cfa1543f55593bc2ed16a70a7c67fe54b1747bb7301f37fdfd6d91028e29
        run: |
          set -euo pipefail
          BUNDLETOOL_PATH="$RUNNER_TEMP/bundletool-all-1.18.3.jar"
          curl --fail --location --silent --show-error "$BUNDLETOOL_URL" --output "$BUNDLETOOL_PATH"
          printf '%s  %s\n' "$BUNDLETOOL_SHA256" "$BUNDLETOOL_PATH" | sha256sum --check --status
          echo "BUNDLETOOL_PATH=$BUNDLETOOL_PATH" >> "$GITHUB_ENV"

      - name: Decode Android release keystore
        shell: bash
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          set -euo pipefail
          umask 077
          KEYSTORE_FILE="${RUNNER_TEMP}/conxius-release.keystore"
          printf '%s' "$KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE_FILE"
          [[ -s "$KEYSTORE_FILE" ]]
          echo "KEYSTORE_PATH=$KEYSTORE_FILE" >> "$GITHUB_ENV"

      - name: Android lint
        working-directory: android
        run: ./gradlew :app:lintRelease --no-daemon

      - name: Android unit tests
        working-directory: android
        run: ./gradlew :app:testDebugUnitTest --no-daemon

      - name: Build signed Android APK and AAB
        working-directory: android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew --no-daemon :app:bundleRelease :app:assembleRelease

      - name: Generate CycloneDX SBOM
        run: node scripts/ci/generate_sbom.mjs --output "$RUNNER_TEMP/release-payload/conxius-wallet.sbom.json"

      - name: Verify signatures, checksums, and artifact existence
        env:
          APK_PATH: android/app/build/outputs/apk/release/app-release.apk
          AAB_PATH: android/app/build/outputs/bundle/release/app-release.aab
          VERSION: ${{ steps.version.outputs.version }}
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          TAG: ${{ steps.version.outputs.tag }}
          GIT_SHA: ${{ github.sha }}
          EXPECTED_SIGNING_CERT_SHA256: ${{ vars.ANDROID_SIGNING_CERT_SHA256 }}
        run: bash scripts/ci/prepare_release_payload.sh "$RUNNER_TEMP/release-payload"

      - name: Upload verified release payload
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ steps.version.outputs.artifact_name }}
          path: ${{ runner.temp }}/release-payload
          if-no-files-found: error
          retention-days: 30

      - name: Remove temporary keystore
        if: always()
        shell: bash
        run: |
          if [[ -n "${KEYSTORE_PATH:-}" && -f "$KEYSTORE_PATH" ]]; then
            shred -u "$KEYSTORE_PATH" || rm -f "$KEYSTORE_PATH"
          fi

  release-attest:
    if: inputs.operation == 'publish'
    name: Release Artifact Attestation
    needs: release-verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      actions: read
      id-token: write
      attestations: write
    steps:
      - name: Download verified release payload
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ needs.release-verify.outputs.artifact_name }}
          path: release-payload
      - name: Attest release payload checksums
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be # v2
        with:
          subject-checksums: release-payload/SHA256SUMS

  release-publish:
    if: inputs.operation == 'publish'
    name: Production Release Publish
    needs: [release-verify, release-attest]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    permissions:
      contents: write
      actions: read
      attestations: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout source commit
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Download exactly verified release payload
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ${{ needs.release-verify.outputs.artifact_name }}
          path: release-payload

      - name: Verify provenance attestation for every release subject
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          bash scripts/ci/verify_release_attestation.sh release-payload "${{ github.sha }}"

      - name: Setup Java for Android artifact verification
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK for artifact verification
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install Android artifact verification tools
        shell: bash
        env:
          ANDROID_BUILD_TOOLS_VERSION: 35.0.0
        run: |
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          sdkmanager "platform-tools" "build-tools;35.0.0"

      - name: Download and checksum-verify pinned bundletool for publish verification
        env:
          BUNDLETOOL_URL: https://github.com/google/bundletool/releases/download/1.18.3/bundletool-all-1.18.3.jar
          BUNDLETOOL_SHA256: a099cfa1543f55593bc2ed16a70a7c67fe54b1747bb7301f37fdfd6d91028e29
        run: |
          set -euo pipefail
          BUNDLETOOL_PATH="$RUNNER_TEMP/bundletool-all-1.18.3.jar"
          curl --fail --location --silent --show-error "$BUNDLETOOL_URL" --output "$BUNDLETOOL_PATH"
          printf '%s  %s\n' "$BUNDLETOOL_SHA256" "$BUNDLETOOL_PATH" | sha256sum --check --status
          echo "BUNDLETOOL_PATH=$BUNDLETOOL_PATH" >> "$GITHUB_ENV"

      - name: Verify downloaded payload and source identity
        env:
          EXPECTED_SIGNING_CERT_SHA256: ${{ vars.ANDROID_SIGNING_CERT_SHA256 }}
        run: |
          bash scripts/ci/verify_release_payload.sh \
            release-payload \
            "${{ needs.release-verify.outputs.version }}" \
            "${{ needs.release-verify.outputs.tag }}" \
            "${{ github.sha }}" \
            "${{ needs.release-verify.outputs.version_code }}"

      - name: Validate production publishing preconditions
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
        run: |
          set -euo pipefail
          if [[ -z "${PLAY_SERVICE_ACCOUNT_JSON:-}" ]]; then
            echo "::error::PLAY_SERVICE_ACCOUNT_JSON is not configured for the production environment"
            exit 1
          fi

      - name: Finalize immutable release evidence before publication
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          bash scripts/ci/finalize_release_evidence.sh \
            release-payload \
            "${{ needs.release-verify.outputs.version }}" \
            "${{ needs.release-verify.outputs.tag }}" \
            "${{ github.sha }}" \
            publish

      - name: Publish exact AAB to Google Play production track
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.conxius.wallet
          releaseFiles: release-payload/app-release.aab
          tracks: production
          status: completed

  release-recover:
    if: inputs.operation == 'recover'
    name: Recover Release Evidence Without Republish
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production
    permissions:
      contents: write
      actions: read
      attestations: read
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Validate explicit recovery request
        env:
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
          SOURCE_SHA: ${{ inputs.source_sha }}
          RECOVERY_CONFIRMATION: ${{ inputs.recovery_confirmation }}
        run: |
          set -euo pipefail
          [[ "$RECOVERY_CONFIRMATION" == "PLAY_PUBLISHED" ]] \
            || { echo "::error::Recovery requires PLAY_PUBLISHED after confirming the exact Play version"; exit 1; }
          [[ "$SOURCE_RUN_ID" =~ ^[1-9][0-9]*$ ]] \
            || { echo "::error::source_run_id must be a positive workflow run ID"; exit 1; }
          [[ "$SOURCE_SHA" =~ ^[0-9a-fA-F]{40}$ ]] \
            || { echo "::error::source_sha must be a full 40-character commit SHA"; exit 1; }

      - name: Verify successful source workflow run
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
          SOURCE_SHA: ${{ inputs.source_sha }}
        run: |
          set -euo pipefail
          run_json="$(gh run view "$SOURCE_RUN_ID" --repo "$GITHUB_REPOSITORY" --json conclusion,event,headSha,jobs,workflowName)"
          RUN_JSON="$run_json" SOURCE_SHA="$SOURCE_SHA" node --input-type=module <<'NODE'
          const run = JSON.parse(process.env.RUN_JSON);
          const publishJob = run.jobs?.find((job) => job.name === 'Production Release Publish');
          const publishStep = publishJob?.steps?.find(
            (step) => step.name === 'Publish exact AAB to Google Play production track',
          );
          if (
            run.event !== 'workflow_dispatch' ||
            run.workflowName !== 'Android Release' ||
            run.headSha !== process.env.SOURCE_SHA ||
            publishStep?.conclusion !== 'success'
          ) {
            throw new Error('source run must contain a successful Google Play publication step for the requested source SHA');
          }
          NODE

      - name: Checkout source commit used by the verified run
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          ref: ${{ inputs.source_sha }}

      - name: Validate source version and tag consistency
        env:
          EXPECTED_VERSION: ${{ inputs.version }}
          EXPECTED_TAG: ${{ inputs.tag }}
        run: |
          set -euo pipefail
          node scripts/ci/check_release_version.mjs \
            --expected-version "$EXPECTED_VERSION" \
            --expected-tag "$EXPECTED_TAG"

      - name: Download exactly verified payload from source run
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: conxius-wallet-release-${{ inputs.version }}
          path: release-payload
          repository: ${{ github.repository }}
          run-id: ${{ inputs.source_run_id }}
          github-token: ${{ github.token }}

      - name: Verify provenance attestation for every recovered subject
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          bash scripts/ci/verify_release_attestation.sh release-payload "${{ inputs.source_sha }}"

      - name: Setup Java for Android artifact verification
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK for artifact verification
        uses: android-actions/setup-android@9fc6c4e9069bf8d3d10b2204b1fb8f6ef7065407 # v3

      - name: Install Android artifact verification tools
        run: |
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          set -o pipefail
          sdkmanager "platform-tools" "build-tools;35.0.0"

      - name: Download and checksum-verify pinned bundletool for recovery verification
        env:
          BUNDLETOOL_URL: https://github.com/google/bundletool/releases/download/1.18.3/bundletool-all-1.18.3.jar
          BUNDLETOOL_SHA256: a099cfa1543f55593bc2ed16a70a7c67fe54b1747bb7301f37fdfd6d91028e29
        run: |
          set -euo pipefail
          BUNDLETOOL_PATH="$RUNNER_TEMP/bundletool-all-1.18.3.jar"
          curl --fail --location --silent --show-error "$BUNDLETOOL_URL" --output "$BUNDLETOOL_PATH"
          printf '%s  %s\n' "$BUNDLETOOL_SHA256" "$BUNDLETOOL_PATH" | sha256sum --check --status
          echo "BUNDLETOOL_PATH=$BUNDLETOOL_PATH" >> "$GITHUB_ENV"

      - name: Verify recovered payload and source identity
        env:
          EXPECTED_SIGNING_CERT_SHA256: ${{ vars.ANDROID_SIGNING_CERT_SHA256 }}
        run: |
          set -euo pipefail
          VERSION_CODE="$(node scripts/ci/derive_android_version_code.mjs "${{ inputs.version }}")"
          bash scripts/ci/verify_release_payload.sh \
            release-payload \
            "${{ inputs.version }}" \
            "${{ inputs.tag }}" \
            "${{ inputs.source_sha }}" \
            "$VERSION_CODE"

      - name: Finalize immutable release evidence without rebuilding or republishing
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          bash scripts/ci/finalize_release_evidence.sh \
            release-payload \
            "${{ inputs.version }}" \
            "${{ inputs.tag }}" \
            "${{ inputs.source_sha }}" \
            recover

      - name: Confirm recovery did not contact Google Play
        run: echo "Recovery finalized release evidence only; Google Play publication was not invoked."
