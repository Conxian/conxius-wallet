[allowlist]
description = "Whitelist documentation, tests, and generated assets"
paths = [
    '''^docs/''',
    '''^tests/''',
    '''^android/app/src/main/assets/public/''',
    '''^pnpm-lock\.yaml$''',
    '''^\.gitleaks\.toml$''',
    '''^CHANGELOG\.md$''',
    '''^README\.md$''',
    '''^AGENTS\.md$'''
]
